services:
  ndpass-server:
    build: .
    container_name: ndpass-server
    restart: unless-stopped
    ports:
      - "3939:3939"
    environment:
      - PORT=3939
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PASS_TYPE_ID=${PASS_TYPE_ID:-pass.com.gios.ndpass}
      - APPLE_TEAM_ID=${APPLE_TEAM_ID:-}
      - SIGNER_KEY_PASSPHRASE=${SIGNER_KEY_PASSPHRASE:-}
    volumes:
      # Mount certs from host — don't bake secrets into the image
      - ./certs:/app/certs:ro
      - ./pass-model:/app/pass-model:ro
